name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build static export
        env:
          # Must match the repo name so assets resolve under /<repo>/.
          NEXT_PUBLIC_BASE_PATH: /ritual-chain-workshop
          # Optional: set these as repo Variables (Settings → Secrets and
          # variables → Actions → Variables) to wire the app to a contract.
          NEXT_PUBLIC_CONTRACT_ADDRESS: ${{ vars.NEXT_PUBLIC_CONTRACT_ADDRESS }}
          NEXT_PUBLIC_RITUAL_RPC_URL: ${{ vars.NEXT_PUBLIC_RITUAL_RPC_URL }}
          NEXT_PUBLIC_RITUAL_CHAIN_ID: ${{ vars.NEXT_PUBLIC_RITUAL_CHAIN_ID || '1979' }}
          NEXT_PUBLIC_RITUAL_EXECUTOR_ADDRESS: ${{ vars.NEXT_PUBLIC_RITUAL_EXECUTOR_ADDRESS }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
        run: npm run build

      - name: Disable Jekyll (serve _next assets)
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
